name: Astronomer CI - Deploy code
on:
  workflow_dispatch:
    inputs:
      deploymentId:
        description: "Deployment ID"
        required: true
        type: string
      apiToken:
        description: "Astro API Token"
        required: true
        type: string
  push:
    branches:
      - main
env:
  ASTRO_API_TOKEN: ${{ inputs.apiToken || secrets.ASTRO_API_TOKEN }}
  DEPLOYMENT_ID: ${{ inputs.deploymentId || vars.DEPLOYMENT_ID }}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4        # ✅ added - required before deploy
    - name: Deploy to Astro
      uses: astronomer/deploy-action@v0.6
      with:
        deployment-id: ${{ env.DEPLOYMENT_ID }}
        dags-only: true                # ✅ no Docker needed
